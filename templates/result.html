<!DOCTYPE html>
<html>

<head>

    <title>Analysis Result</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

    <!-- Navbar -->

    <div class="navbar">

        <div class="logo">
            AuthentiNews AI
        </div>

        <div>

            <a href="/">
                <button>Home</button>
            </a>

            <a href="/dashboard">
                <button>Dashboard</button>
            </a>

        </div>

    </div>


    <!-- Main Container -->

    <div class="container">

        <div class="result-box">

            <!-- Prediction -->

            {% if prediction == "REAL NEWS" %}

                <div class="prediction-badge real-badge">

                    {{ prediction }}

                </div>

            {% else %}

                <div class="prediction-badge fake-badge">

                    {{ prediction }}

                </div>

            {% endif %}


            <!-- Confidence -->

            <div class="confidence-section">

                <h2>
                    Confidence Score
                </h2>

                <div class="progress-bar">

                    <div class="progress-fill"
                         style="width: {{ confidence }}%;">

                        {{ confidence }}%

                    </div>

                </div>

            </div>


            <!-- Explanation -->

            <div class="explanation-section">

                <h2>
                    AI Explanation
                </h2>

                <div class="explanation-grid">

                    {% for word, score in explanation %}

                        <div class="explanation-card">

                            <h3>
                                {{ word }}
                            </h3>

                            <p>
                                Influence:
                                {{ score }}
                            </p>

                        </div>

                    {% endfor %}

                </div>

            </div>


            <!-- Button -->

            <a href="/">

                <button>
                    Analyze Another News
                </button>

            </a>

        </div>

    </div>

</body>

</html>
