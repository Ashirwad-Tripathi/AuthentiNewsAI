<!DOCTYPE html>
<html>

<head>

    <title>Login</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

    <div class="container">

        <h1>Login</h1>

        <form action="/login" method="POST">

            <input
                type="email"
                name="email"
                placeholder="Enter Email"
                required>

            <br><br>

            <input
                type="password"
                name="password"
                placeholder="Enter Password"
                required>

            <br>

            <button type="submit">
                Login
            </button>

        </form>

        <br>

        <p>
            Don't have an account?
        </p>

        <a href="/register">
            <button>
                Register Here
            </button>
        </a>

        <br><br>

        <a href="/">
            <button>
                Back Home
            </button>
        </a>

    </div>

</body>

</html>
