<!DOCTYPE html>
<html>

<head>

    <title>Register</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

    <div class="container">

        <h1>Create Account</h1>

        <form action="/register" method="POST">

            <input
                type="text"
                name="name"
                placeholder="Enter Name"
                required>

            <br><br>

            <input
                type="email"
                name="email"
                placeholder="Enter Email"
                required>

            <br><br>

            <input
                type="password"
                name="password"
                placeholder="Enter Password"
                required>

            <br>

            <button type="submit">
                Register
            </button>

        </form>

        <br>

        <p>
            Already have an account?
        </p>

        <a href="/login">
            <button>
                Login Here
            </button>
        </a>

        <br><br>

        <a href="/">
            <button>
                Back Home
            </button>
        </a>

    </div>

</body>

</html>
